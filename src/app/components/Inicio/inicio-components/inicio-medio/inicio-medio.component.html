<div style="text-align: center; color: blue;">
  <h2>Proximos Eventos</h2>
</div>
<div class="container">
<div class="contenedor-eventos">
  <div 
    *ngFor="let evento of listaEventos | slice:0:4; trackBy: trackByFn" 
    [routerLink]="['/formato-eventos']" 
    [state]="{ infoEvento: evento }" 
    class="imagenes"
  >
    <div class="arriba">
      <div class="fecha">
        <div class="dia">{{ evento.fecha }}</div>
      </div>
    </div>
    <div class="abajo">
      <div class="detalles"><strong>Evento:</strong> {{ evento.titulo }}</div>
      <div class="detalles"><strong>Lugar:</strong> {{ evento.lugar }}</div>
      <div class="detalles"><strong>Hora:</strong> {{ evento.hora }}</div>
    </div>
  </div>
</div>
</div>
