<div class="container">
    <div class="form-box">
        <h2>Crear Cuenta</h2>
        <p class="subtitle">Regístrate para comenzar</p>
        
        @if (errorMessage) {
            <div class="error-message-box" style="background-color: #ffdddd; color: #d8000c; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center;">
                {{ errorMessage }}
            </div>
        }

        @if (successMessage) {
            <div class="success-message-box" style="background-color: #ddffdd; color: #4f8a10; padding: 10px; border-radius: 6px; margin-bottom: 15px; text-align: center;">
                {{ successMessage }}
            </div>
        }

        <form (ngSubmit)="onRegister()">
            
            <div class="input-group">
                <label for="username">Nombre de Usuario (Username)</label>
                <div class="input-field">
                    <i class='bx bx-user'></i>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        [(ngModel)]="username" 
                        placeholder="Ej: criser" 
                        required>
                </div>
            </div>

            <div class="input-group">
                <label for="email">Correo Electrónico</label>
                <div class="input-field">
                    <i class='bx bx-envelope'></i>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        [(ngModel)]="email" 
                        placeholder="ejemplo@correo.com" 
                        required>
                </div>
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <div class="input-field">
                    <i class='bx bx-lock-alt'></i>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        [(ngModel)]="password" 
                        placeholder="Mínimo 8 caracteres" 
                        required>
                </div>
            </div>

            <div class="input-group">
                <label for="confirm-password">Confirmar Contraseña</label>
                <div class="input-field">
                    <i class='bx bx-shield-quarter'></i>
                    <input 
                        type="password" 
                        id="confirm-password" 
                        name="confirmPassword" 
                        [(ngModel)]="confirmPassword" 
                        placeholder="Repite tu contraseña" 
                        required>
                </div>
            </div>

            <button type="submit" class="btn-register">Registrarse</button>
        </form>

        <div class="login-link">
            ¿Ya tienes una cuenta? <a [routerLink]="['/inicio-sesion']">Inicia sesión</a>
        </div>
    </div>
</div>
